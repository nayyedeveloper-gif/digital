kind = "web"
previewPath = "/"
title = "Digital Marketing Chairman Dashboard"
version = "1.0.0"
id = "artifacts/chairman-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18984

[services.development]
run = "pnpm --filter @workspace/chairman-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chairman-dashboard", "run", "build" ]
publicDir = "artifacts/chairman-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18984"
BASE_PATH = "/"
